server {
    bind_address = "0.0.0.0"
    bind_port = "8081"
    trust_domain = "home-ai-lab"
    data_dir = "/run/spire/data"
    log_level = "DEBUG"
    
    # CA TTL - how long the CA certificate is valid
    ca_ttl = "24h"
    
    # Default X.509 SVID TTL - workload identity certificates
    # 1 hour provides good balance between security and performance
    default_x509_svid_ttl = "1h"
    
    # Default JWT SVID TTL - for API authentication
    # 5 minutes for high security on agent-to-agent calls
    default_jwt_svid_ttl = "5m"
}

plugins {
    # SQLite datastore for development
    # Consider PostgreSQL for production
    DataStore "sql" {
        plugin_data {
            database_type = "sqlite3"
            connection_string = "/run/spire/data/datastore.sqlite3"
        }
    }
    
    # In-memory key manager (use disk for production)
    KeyManager "memory" {
        plugin_data {}
    }
    
    # Join token attestation for initial bootstrap (R730, new agents)
    NodeAttestor "join_token" {
        plugin_data {}
    }

    # X.509 PoP attestation for persistent agents (survives restarts)
    NodeAttestor "x509pop" {
        plugin_data {
            ca_bundle_path = "/etc/spire/server/certs/agent-attestation-ca.crt"
        }
    }
}
