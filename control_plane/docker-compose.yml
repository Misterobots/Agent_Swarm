version: '3.8'

services:
  # --- Docker Sidecar Probe (read-only container metadata) ---
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:latest
    container_name: docker-socket-proxy-control
    restart: unless-stopped
    environment:
      - CONTAINERS=1
      - INFO=1
      - PING=1
      - VERSION=1
      - EVENTS=0
      - POST=0
      - AUTH=0
      - BUILD=0
      - IMAGES=0
      - NETWORKS=0
      - VOLUMES=0
      - SYSTEM=0
    volumes:
      - //var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "2375:2375"
    networks:
      - swarm_net

  # --- Identity Service (SPIRE Server) ---
  spire-server:
    image: ghcr.io/spiffe/spire-server:1.10.1
    container_name: spire-server
    hostname: spire-server
    user: "0:0"
    ports:
      - "8081:8081"
    volumes:
      - ./config/spire:/etc/spire/server
      - spire_data:/run/spire/data
      - //var/run/docker.sock:/var/run/docker.sock:ro
    command: ["-config", "/etc/spire/server/server.conf"]
    healthcheck:
      test: ["CMD", "/opt/spire/bin/spire-server", "healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3

    networks:
      - swarm_net

    restart: unless-stopped

  # --- Control Plane Security Service ---
  security:
    build:
      context: ./security
      dockerfile: Dockerfile
    container_name: control-security
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
      - ./security/.env
      - ../network.env
    environment:
      - DATABASE_URL=postgresql://${LANGFUSE_DB_USER}:${LANGFUSE_DB_PASSWORD}@postgres:5432/${LANGFUSE_DB_NAME}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_EXPIRATION_HOURS=24
      - LOG_LEVEL=INFO
    ports:
      - "8001:8001"
    networks:
      - swarm_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # --- Langfuse Database (PostgreSQL) ---
  postgres:
    image: pgvector/pgvector:pg15
    container_name: postgres
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${LANGFUSE_DB_USER}
      POSTGRES_PASSWORD: ${LANGFUSE_DB_PASSWORD}
      POSTGRES_DB: ${LANGFUSE_DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - swarm_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse -d langfuse"]
      interval: 10s
      timeout: 5s
      retries: 5




  # --- MemPalace Memory Service ---
  mempalace:
    build:
      context: ./mempalace
      dockerfile: Dockerfile
    container_name: mempalace
    restart: unless-stopped
    env_file:
      - .env
      - ../network.env
    environment:
      - MEMPALACE_DB_USER=${LANGFUSE_DB_USER}
      - MEMPALACE_DB_PASSWORD=${LANGFUSE_DB_PASSWORD}
      - MEMPALACE_DB_HOST=${HOPPER_IP:-192.168.2.102}
      - MEMPALACE_DB_PORT=5432
      - MEMPALACE_DB_NAME=${LANGFUSE_DB_NAME}
      - OLLAMA_HOST=http://192.168.2.101:11434
      - EMBED_MODEL=nomic-embed-text
      - EXTRACT_MODEL=nemotron-mini
      - LOG_LEVEL=INFO
    ports:
      - "8200:8200"
    networks:
      - swarm_net
      - ai_lab_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8200/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Langfuse Observability ---
  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    container_name: clickhouse
    restart: unless-stopped
    environment:
      - CLICKHOUSE_DB=${LANGFUSE_DB_NAME}
      - CLICKHOUSE_USER=${LANGFUSE_DB_USER}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD}
    ports:
      - "8123:8123"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    networks:
      - swarm_net
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  langfuse-web:
    image: langfuse/langfuse:3
    container_name: langfuse-web
    restart: unless-stopped
    depends_on:
      clickhouse:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_healthy
    env_file:
      - ../network.env
      - .env
    environment: &langfuse-env
      # Database
      - DATABASE_URL=postgresql://${LANGFUSE_DB_USER}:${LANGFUSE_DB_PASSWORD}@postgres:5432/${LANGFUSE_DB_NAME}
      # ClickHouse
      - CLICKHOUSE_URL=http://clickhouse:8123
      - CLICKHOUSE_MIGRATION_URL=clickhouse://${LANGFUSE_DB_USER}:${CLICKHOUSE_PASSWORD}@clickhouse:9000/${LANGFUSE_DB_NAME}
      - CLICKHOUSE_USER=${LANGFUSE_DB_USER}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD}
      - CLICKHOUSE_CLUSTER_ENABLED=false
      # Auth
      - NEXTAUTH_SECRET=${LANGFUSE_NEXTAUTH_SECRET}
      - NEXTAUTH_URL=http://${HOPPER_IP}:3000
      - SALT=${LANGFUSE_SALT}
      - ENCRYPTION_KEY=${LANGFUSE_ENCRYPTION_KEY}
      # Redis
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_AUTH=${REDIS_PASSWORD}
      # S3/MinIO (Required for event storage)
      - LANGFUSE_S3_EVENT_UPLOAD_BUCKET=langfuse
      - LANGFUSE_S3_EVENT_UPLOAD_REGION=auto
      - LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID=${MINIO_ROOT_USER}
      - LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD}
      - LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT=http://minio:9000
      - LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE=true
      - LANGFUSE_S3_EVENT_UPLOAD_PREFIX=events/
      # Disable batch export and media upload for simpler setup
      - LANGFUSE_S3_BATCH_EXPORT_ENABLED=false
      - LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES=true
      - TELEMETRY_ENABLED=false
    ports:
      - "3000:3000"
    networks:
      - swarm_net

  # Langfuse v3 Worker: Processes ingestion queue -> ClickHouse
  langfuse-worker:
    image: langfuse/langfuse-worker:3
    container_name: langfuse-worker
    restart: unless-stopped
    depends_on:
      langfuse-web:
        condition: service_started
    environment: *langfuse-env
    networks:
      - swarm_net


  redis:
    image: redis:7.2-alpine
    container_name: redis-hopper
    restart: unless-stopped
    command: >
      --requirepass ${REDIS_PASSWORD}
      --maxmemory-policy noeviction
    env_file:
      - .env
    ports:
      - "6379:6379"
    networks:
      - swarm_net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 3s
      timeout: 10s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: minio
    restart: unless-stopped
    entrypoint: sh
    command: -c 'mkdir -p /data/langfuse && minio server --address ":9000" --console-address ":9001" /data'
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      - "9190:9000"
      - "9191:9001"
    networks:
      - swarm_net
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

networks:
  swarm_net:
    driver: bridge
  ai_lab_net:
    external: true
    name: ai_lab_net

volumes:
  pg_data:
  mempalace_data:
  spire_data:
  clickhouse_data:
  minio_data:

