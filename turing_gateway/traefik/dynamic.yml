tls:
  options:
    default:
      sniStrict: true
    securetls:
      minVersion: VersionTLS12
      sniStrict: true
      cipherSuites:
        - TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384
        - TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384
        - TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256
        - TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256
        - TLS_ECDHE_ECDSA_WITH_CHACHA20_POLY1305
        - TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305

http:
  middlewares:
    globalHeaders:
      headers:
        hostsProxyHeaders:
          - X-Forwarded-Host
        customResponseHeaders:
          server: ""
          x-xss-protection: ""
        frameDeny: false
        contentTypeNosniff: true
    secureHeaders:
      headers:
        sslProxyHeaders:
          X-Forwarded-Proto: https
    dropsecurityheaders:
      headers:
        accessControlAllowCredentials: true
        accessControlAllowHeaders: "*"
        accessControlAllowMethods: "*"
        accessControlAllowOriginList: "*"
        accessControlExposeHeaders: "*"
        accessControlMaxAge: 100000
        customResponseHeaders:
          content-security-policy: ""
          cross-origin-opener-policy: ""
          permissions-policy: ""
          referrer-policy: ""
          x-frame-options: ""
          x-webkit-csp: ""
    hsts:
      headers:
        stsSeconds: 63072000
        stsIncludeSubdomains: true
        stsPreload: true
        forceSTSHeader: true
    robotHeaders:
      headers:
        customResponseHeaders:
          X-Robots-Tag: none,noarchive,nosnippet,notranslate,noimageindex
    cf-https-proto:
      headers:
        customRequestHeaders:
          X-Forwarded-Proto: "https"
    authentik:
      forwardAuth:
        address: http://authentik:9000/outpost.goauthentik.io/auth/traefik
        trustForwardHeader: true
        authResponseHeaders:
          - X-authentik-username
          - X-authentik-groups
          - X-authentik-email
          - X-authentik-uid
          - X-authentik-jwt
          - X-authentik-meta-jwks
          - X-authentik-meta-outpost
          - X-authentik-meta-provider
          - X-authentik-meta-app
          - X-authentik-meta-version
  serversTransports:
    skipverify:
      insecureSkipVerify: true
  routers:
    authentik-cf-http:
      rule: "Host(`auth.shivelymedia.com`)"
      entryPoints: [web]
      priority: 50
      service: authentik-cf-http
      middlewares: [globalHeaders@file, robotHeaders@file, cf-https-proto@file]
    authentik-secure:
      rule: "Host(`auth.shivelymedia.com`)"
      entryPoints: [websecure]
      priority: 50
      service: authentik-cf-http
      middlewares: [globalHeaders@file, secureHeaders@file, robotHeaders@file]
      tls:
        certResolver: cfdns
    authentik-outpost-cf-http:
      rule: "PathPrefix(`/outpost.goauthentik.io/`)"
      entryPoints: [web]
      priority: 100
      service: authentik-cf-http
      middlewares: [globalHeaders@file, cf-https-proto@file]
    authentik-outpost-secure:
      rule: "PathPrefix(`/outpost.goauthentik.io/`)"
      entryPoints: [websecure]
      priority: 100
      service: authentik-cf-http
      middlewares: [globalHeaders@file]
      tls:
        certResolver: cfdns
    sonarr-web:
      rule: "Host(`sonarr.shivelymedia.com`)"
      entryPoints: [web]
      priority: 50
      service: sonarr
      middlewares: [globalHeaders@file, robotHeaders@file, cf-https-proto@file]
    sonarr-secure:
      rule: "Host(`sonarr.shivelymedia.com`)"
      entryPoints: [websecure]
      priority: 50
      service: sonarr
      middlewares: [globalHeaders@file, secureHeaders@file, robotHeaders@file]
      tls:
        certResolver: cfdns
    radarr-web:
      rule: "Host(`radarr.shivelymedia.com`)"
      entryPoints: [web]
      priority: 50
      service: radarr
      middlewares: [globalHeaders@file, robotHeaders@file, cf-https-proto@file]
    radarr-secure:
      rule: "Host(`radarr.shivelymedia.com`)"
      entryPoints: [websecure]
      priority: 50
      service: radarr
      middlewares: [globalHeaders@file, secureHeaders@file, robotHeaders@file]
      tls:
        certResolver: cfdns
    sabnzbd-web:
      rule: "Host(`sabnzbd.shivelymedia.com`)"
      entryPoints: [web]
      priority: 50
      service: sabnzbd
      middlewares: [globalHeaders@file, robotHeaders@file, cf-https-proto@file]
    sabnzbd-secure:
      rule: "Host(`sabnzbd.shivelymedia.com`)"
      entryPoints: [websecure]
      priority: 50
      service: sabnzbd
      middlewares: [globalHeaders@file, secureHeaders@file, robotHeaders@file]
      tls:
        certResolver: cfdns
    seerr-web:
      rule: "Host(`seerr.shivelymedia.com`)"
      entryPoints: [web]
      priority: 50
      service: seerr
      middlewares: [globalHeaders@file, robotHeaders@file, cf-https-proto@file]
    seerr-secure:
      rule: "Host(`seerr.shivelymedia.com`)"
      entryPoints: [websecure]
      priority: 50
      service: seerr
      middlewares: [globalHeaders@file, secureHeaders@file, robotHeaders@file]
      tls:
        certResolver: cfdns
    jellyfin-local:
      rule: "Host(`jellyfin.shivelymedia.com`)"
      entryPoints: [web]
      priority: 50
      service: jellyfin
      middlewares: [globalHeaders@file]
  services:
    authentik-cf-http:
      loadBalancer:
        servers:
          - url: http://authentik:9000
    sonarr:
      loadBalancer:
        servers:
          - url: http://sonarr:8989
    radarr:
      loadBalancer:
        servers:
          - url: http://radarr:7878
    sabnzbd:
      loadBalancer:
        servers:
          - url: http://sabnzbd:8080
    seerr:
      loadBalancer:
        servers:
          - url: http://seerr:5055
    jellyfin:
      loadBalancer:
        servers:
          - url: http://jellyfin:8096
