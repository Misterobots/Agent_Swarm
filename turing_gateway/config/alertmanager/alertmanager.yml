global:
  resolve_timeout: 5m
  pagerduty_url: 'https://events.pagerduty.com/v2/enqueue'
  opsgenie_api_url: 'https://api.opsgenie.com/'

route:
  receiver: "default-receiver"
  group_by: ['alertname', 'cluster', 'service']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 12h
  routes:
    # Mirror every alert to the maintenance_router. It classifies the alert
    # and either dispatches it to auto_repair_daemon (agent_safe path) or
    # parks it in the Mission Control human queue. The original email/ntfy
    # receivers still fire — this route is additive (continue: true).
    - receiver: "maintenance-router"
      continue: true
    - receiver: "default-receiver"
      group_by: ['env', 'instance']

receivers:
  - name: "maintenance-router"
    webhook_configs:
      - url: 'http://maintenance-router:9095/webhook/alertmanager'
        send_resolved: true
        max_alerts: 0   # forward every alert in the group, no batching cap

  - name: "default-receiver"
    email_configs:
      - to: 'Justin@shivelymail.com'
        from: 'Admin@Graceful-Tech.com'
        smarthost: 'smtp.zoho.com:587'
        auth_username: 'Admin@Graceful-Tech.com'
        auth_identity: 'Admin@Graceful-Tech.com'
        # Password is materialized from $ALERT_SMTP_PASSWORD by the container
        # entrypoint (see turing_gateway/docker-compose.yml alertmanager service).
        # The file is written to an in-container tmpfs and never persisted to
        # the repo or to disk.
        auth_password_file: /tmp/secrets/smtp_password
        require_tls: true
        send_resolved: true
    webhook_configs:
      - url: 'https://notify.shivelymedia.com/home-ai-alerts'
        send_resolved: true

inhibit_rules: []
