# Turing Monitoring Stack - FIXED VERSION
# Monitoring services only (reuses existing Traefik on port 80)
# KEY FIXES: 
# - Removed version: attribute
# - Fixed Loki permission issue (using proper volume mount)
# - Fixed Promtail config mount with environment variable override
# - Added user permissions for Loki

services:
  # ═══════════════════════════════════════════════════════════════════════════════
  # METRICS & OBSERVABILITY
  # ═══════════════════════════════════════════════════════════════════════════════

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus-Turing
    hostname: prometheus-Turing
    restart: unless-stopped
    volumes:
      - ./config/prometheus:/etc/prometheus
      - prometheus_data:/prometheus
    ports:
      - "9091:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=90d'
    networks:
      - monitoring
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.prometheus.rule=PathPrefix(`/prometheus`)"
      - "traefik.http.routers.prometheus.entrypoints=web"
      - "traefik.http.services.prometheus.loadbalancer.server.port=9090"

  loki:
    image: grafana/loki:latest
    container_name: loki-Turing
    hostname: loki-Turing
    restart: unless-stopped
    user: "0:0"  # Run as root to avoid permission issues with /tmp/loki/rules
    ports:
      - "3101:3100"
    volumes:
      - ./config/loki:/etc/loki:ro
      - loki_data:/loki:rw  # Loki will create its own subdirs inside
    command: -config.file=/etc/loki/loki.yml
    networks:
      - monitoring
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.loki.rule=PathPrefix(`/loki`)"
      - "traefik.http.routers.loki.entrypoints=web"
      - "traefik.http.services.loki.loadbalancer.server.port=3100"

  promtail:
    image: grafana/promtail:latest
    container_name: promtail-Turing
    hostname: promtail-Turing
    restart: unless-stopped
    ports:
      - "9081:9080"
    volumes:
      - ./config/promtail:/etc/promtail:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/log:/var/log:ro
    # Use default config if file missing - helps with bootstrap
    command: 
      - '-config.file=/etc/promtail/promtail.yml'
      - '-config.expand-env=true'
    environment:
      - HOSTNAME=Turing
      - LOKI_URL=http://loki-Turing:3100
    networks:
      - monitoring
    depends_on:
      - loki

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor-Turing
    hostname: cadvisor-Turing
    restart: unless-stopped
    ports:
      - "8889:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    devices:
      - /dev/kmsg
    networks:
      - monitoring
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.cadvisor.rule=PathPrefix(`/cadvisor`)"
      - "traefik.http.routers.cadvisor.entrypoints=web"
      - "traefik.http.services.cadvisor.loadbalancer.server.port=8080"

  grafana:
    image: grafana/grafana:latest
    container_name: grafana-Turing
    hostname: grafana-Turing
    restart: unless-stopped
    ports:
      - "3002:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER}
      - GF_SECURITY_SECRET_KEY=${GF_SECURITY_SECRET_KEY}
      - GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS=
      - GF_LOG_LEVEL=info
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
    volumes:
      - grafana_data:/var/lib/grafana
      - ./provisioning:/etc/grafana/provisioning:ro
      - ./dashboards:/etc/grafana/dashboards:ro
    depends_on:
      - prometheus
      - loki
    networks:
      - monitoring
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=PathPrefix(`/grafana`)"
      - "traefik.http.routers.grafana.entrypoints=web"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"

  # Redis for task queue persistence
  redis-monitoring-Turing:
    image: redis:7.2-alpine
    container_name: redis-monitoring-Turing
    hostname: redis-monitoring-Turing
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - monitoring

# ═══════════════════════════════════════════════════════════════════════════════
# VOLUMES & NETWORKS
# ═══════════════════════════════════════════════════════════════════════════════

volumes:
  prometheus_data:
    driver: local
  loki_data:
    driver: local
  grafana_data:
    driver: local
  redis_data:
    driver: local

networks:
  monitoring:
    driver: bridge
    name: monitoring-Turing


