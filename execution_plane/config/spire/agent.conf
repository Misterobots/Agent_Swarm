agent {
    data_dir = "/run/spire/agent"
    log_level = "DEBUG"

    # Connection to SPIRE Server (Control Plane @ 192.168.2.102)
    server_address = "192.168.2.102"
    server_port = "8081"

    # Trust domain must match server
    trust_domain = "home-ai-lab"

    # Socket for workload API
    socket_path = "/var/run/spire/agent.sock"

    # Bootstrap trust from the server — use insecure bootstrap for initial join
    insecure_bootstrap = true
}

plugins {
    # Join Token attestation — uses one-time token from SPIRE server
    NodeAttestor "join_token" {
        plugin_data {}
    }

    # Docker workload attestor
    WorkloadAttestor "docker" {
        plugin_data {
            # Enable new container locator for better compatibility
            use_new_container_locator = true
            docker_socket_path = "unix:///var/run/docker.sock"
        }
    }

    # Disk-based key manager — persists keys across container restarts
    KeyManager "disk" {
        plugin_data {
            directory = "/run/spire/agent"
        }
    }
}
