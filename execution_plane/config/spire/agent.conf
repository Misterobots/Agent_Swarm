agent {
    data_dir = "/run/spire/agent"
    log_level = "DEBUG"

    # Connection to SPIRE Server (Control Plane @ 192.168.2.102)
    server_address = "192.168.2.102"
    server_port = "8081"

    # Trust domain must match server
    trust_domain = "home-ai-lab"

    # Socket for workload API
    socket_path = "/var/run/spire/agent.sock"

    # Bootstrap trust from the server
    insecure_bootstrap = true
}

plugins {
    # x509pop attestation — presents a long-lived certificate signed by the
    # agent-attestation-ca. Persistent across container restarts; no join token needed.
    NodeAttestor "x509pop" {
        plugin_data {
            private_key_path = "/etc/spire/agent/certs/lovelace-agent.key"
            certificate_path = "/etc/spire/agent/certs/lovelace-agent.crt"
        }
    }

    # Docker workload attestor — identifies workloads by container label
    WorkloadAttestor "docker" {
        plugin_data {
            use_new_container_locator = true
            docker_socket_path = "unix:///var/run/docker.sock"
        }
    }

    # Disk-based key manager — persists SVID keys across container restarts
    KeyManager "disk" {
        plugin_data {
            directory = "/run/spire/agent"
        }
    }
}
