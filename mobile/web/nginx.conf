# Memex mobile web app (mxmobile.shivelymedia.com)
# Serves the Memex Desktop renderer as an SPA and reverse-proxies the backends
# same-origin (browser sees no cross-origin calls; Authentik gates at the Traefik
# edge). SSE + WebSocket aware. Uses Docker's embedded resolver + variable
# proxy_pass so nginx starts even if an upstream is momentarily unresolvable.

server {
    listen 3000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    resolver 127.0.0.11 valid=30s ipv6=off;

    location = /.well-known/assetlinks.json {
        default_type application/json;
    }

    # agent_runtime — chat (SSE), conversations, models, runs. $request_uri is
    # preserved (/v1/... → agent_runtime/v1/...).
    location /v1/ {
        set $up http://agent_runtime:8000;
        proxy_pass         $up;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   Connection "";
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffering    off;          # SSE
        proxy_cache        off;
        proxy_read_timeout 3600s;
    }

    # WebSocket terminal
    location /ws/ {
        set $up http://agent_runtime:8000;
        proxy_pass         $up;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_read_timeout 3600s;
    }

    # MemPalace (strip /mp prefix)
    location /mp/ {
        set $up http://192.168.2.102:8200;
        rewrite ^/mp/(.*)$ /$1 break;
        proxy_pass         $up;
        proxy_set_header   Host $host;
        proxy_read_timeout 60s;
    }

    # Ollama model list (strip /ollama prefix)
    location /ollama/ {
        set $up http://192.168.2.101:11434;
        rewrite ^/ollama/(.*)$ /$1 break;
        proxy_pass         $up;
        proxy_set_header   Host $host;
        proxy_read_timeout 60s;
    }

    # SPA fallback — client-side app
    location / {
        try_files $uri /index.html;
    }
}
