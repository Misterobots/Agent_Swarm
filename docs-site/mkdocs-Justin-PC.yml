site_name: Memex — Home AI Lab Documentation
site_description: Documentation library for the Home AI Lab Agentic Hive — a self-hosted, distributed multi-agent AI system.
repo_url: https://github.com/Misterobots/Agent_Swarm
repo_name: Misterobots/Agent_Swarm
edit_uri: edit/main/docs-site/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow
  icon:
    repo: fontawesome/brands/github
  logo: assets/logo.png
  favicon: assets/favicon.png

plugins:
  - search
  - macros:
      module_name: macros
  - glightbox:
      touchNavigation: true
      loop: false
      effect: zoom
      slide_effect: slide
      width: "100%"
      height: auto
      zoomable: true
      draggable: true
      auto_caption: true
  - git-revision-date-localized:
      enable_creation_date: true
      fallback_to_build_date: true
  - minify:
      minify_html: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.critic
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - def_list
  - toc:
      permalink: true
      toc_depth: 3

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Misterobots/Agent_Swarm
  generator: false
  # Reusable variables via macros plugin
  vars:
    project_name: "Memex"
    version: "3.4"
    phase: "Phase 6 Complete"
    control_node_ip: "192.168.2.102"
    execution_node_ip: "192.168.2.101"
    gateway_node_ip: "192.168.2.103"
    home_assistant_ip: "192.168.2.100"
    hive_ui_url: "http://192.168.2.103"
    langfuse_url: "http://192.168.2.102:3000"
    grafana_url: "http://192.168.2.103:3001"
    prometheus_url: "http://192.168.2.103:9091"
    ollama_port: "11434"
    agent_runtime_port: "8008"
    solver_model: "qwen3.5:9b"
    router_model: "nemotron-orchestrator:8b"
    verifier_model: "llama-guard-3:8b"
    coordinator_model: "qwen3:14b"

extra_css:
  - stylesheets/extra.css
  - stylesheets/theme-sync.css

extra_javascript:
  - javascripts/theme-sync.js

