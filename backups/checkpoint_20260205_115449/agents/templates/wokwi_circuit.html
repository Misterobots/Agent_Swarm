<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Wokwi Board Viewer</title>
    <style>
        body {
            background-color: #252526; /* VS Code Dark */
            color: #ccc;
            font-family: sans-serif;
            margin: 0;
            overflow: hidden; 
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .canvas {
            position: relative;
            width: 800px;
            height: 600px;
            background: radial-gradient(#333 1px, transparent 1px);
            background-size: 20px 20px;
            border: 1px solid #444;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            transform-origin: center;
        }
        
        /* Absolute positioning for parts based on top/left from JSON */
        .wokwi-part {
            position: absolute;
            /* Note: Wokwi JSON uses pixel coordinates usually */
        }
    </style>
    
    <!-- Load Wokwi Elements (ES Module) -->
    <script type="module" src="https://unpkg.com/@wokwi/elements@0.48.3/dist/wokwi-elements.bundle.js"></script>
  </head>
  <body>
    <div id="board-canvas" class="canvas">
        <!-- Parts injected here -->
    </div>

    <script type="module">
        const diagram = {{DIAGRAM_JSON}};
        const container = document.getElementById("board-canvas");

        // Map internal JSON types to Wokwi Element tags
        // This is a partial map, covering common parts.
        const TYPE_MAP = {
            "board-esp32-devkit-c-v4": "wokwi-esp32-devkit-v1",
            "wokwi-led": "wokwi-led",
            "wokwi-resistor": "wokwi-resistor",
            "wokwi-pushbutton": "wokwi-pushbutton",
            "wokwi-servo": "wokwi-servo",
            "wokwi-lcd1602": "wokwi-lcd1602",
            "wokwi-oled-ssd1306": "wokwi-ssd1306",
            "wokwi-dht22": "wokwi-dht22"
        };

        // Render Parts
        (diagram.parts || []).forEach(part => {
            const tagName = TYPE_MAP[part.type] || "div";
            const el = document.createElement(tagName);
            
            // OPTIONAL: Add ID for lookup
            el.id = part.id;
            
            el.classList.add("wokwi-part");
            el.style.left = (part.left || 0) + "px";
            el.style.top = (part.top || 0) + "px";
            
            // Attributes (Color, Value, Label)
            if (part.attrs) {
                if (part.attrs.color) el.setAttribute("color", part.attrs.color);
                if (part.attrs.value) el.setAttribute("value", part.attrs.value);
                if (part.attrs.label) el.setAttribute("label", part.attrs.label);
            }

            // Fallback for unknown parts
            if (tagName === "div") {
                el.style.width = "50px";
                el.style.height = "50px";
                el.style.border = "2px dashed red";
                el.textContent = part.type.replace("wokwi-", "");
                el.style.display = "flex";
                el.style.alignItems = "center";
                el.style.justifyContent = "center";
                el.style.fontSize = "10px";
                el.style.background = "rgba(255,0,0,0.1)";
            }

            container.appendChild(el);
        });

        // --- WIRE RENDERING (V2) ---
        const svgInfo = document.createElement("div");
        svgInfo.style.position = "absolute";
        svgInfo.style.top = "0"; svgInfo.style.left = "0"; svgInfo.style.width = "100%"; svgInfo.style.height = "100%";
        svgInfo.style.pointerEvents = "none"; // Let clicks pass through to elements
        svgInfo.innerHTML = `<svg id="wire-layer" width="800" height="600" style="overflow:visible;"></svg>`;
        container.appendChild(svgInfo);
        
        const svg = document.getElementById("wire-layer");

        function getPinOffset(el, pinName) {
            // Heuristic Pin Mapping for common components
            // Returns {x, y} relative to the element top-left
            const w = el.offsetWidth || 50; 
            const h = el.offsetHeight || 50;
            
            // ESP32: Pins are along vertical edges
            if (el.tagName.includes("ESP32")) {
                if (pinName.includes("GND") || pinName.includes("5V")) return {x: 0, y: h-10};
                if (pinName.startsWith("D")) {
                     const num = parseInt(pinName.replace("D","")) || 0;
                     // Rough distributon
                     return { x: (num % 2 == 0) ? 0 : w, y: (num * 10) % h };
                }
            }
            // LED: A/C are infinite
            if (el.tagName.includes("LED")) {
                 if (pinName === "A") return {x: w, y: h/2}; // Anode right
                 if (pinName === "C") return {x: 0, y: h/2};  // Cathode left
            }
            
            // Default: Center
            return { x: w/2, y: h/2 };
        }

        setTimeout(() => {
            // Delay to allow Elements to render/size
            diagram.connections.forEach(conn => {
                if (conn.length < 2) return;
                
                // Connection format: "partID:pinName"
                const [srcId, srcPin] = conn[0].split(":");
                const [tgtId, tgtPin] = conn[1].split(":");
                const color = conn[2] || "green";
                
                const srcEl = document.getElementById(srcId);
                const tgtEl = document.getElementById(tgtId);
                
                if (srcEl && tgtEl) {
                    const srcOff = getPinOffset(srcEl, srcPin);
                    const tgtOff = getPinOffset(tgtEl, tgtPin);
                    
                    // Element positions (top/left)
                    const srcX = parseFloat(srcEl.style.left) + srcOff.x;
                    const srcY = parseFloat(srcEl.style.top)  + srcOff.y;
                    
                    const tgtX = parseFloat(tgtEl.style.left) + tgtOff.x;
                    const tgtY = parseFloat(tgtEl.style.top)  + tgtOff.y;
                    
                    const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                    line.setAttribute("x1", srcX);
                    line.setAttribute("y1", srcY);
                    line.setAttribute("x2", tgtX);
                    line.setAttribute("y2", tgtY);
                    line.setAttribute("stroke", color);
                    line.setAttribute("stroke-width", "3");
                    line.setAttribute("stroke-opacity", "0.7");
                    
                    svg.appendChild(line);
                }
            });
        }, 500);

        // NOTE: Wires (SVG Lines) are complex to render manually without the full engine.
        // For V1 of "Visual Board", we render components placed on the grid.
        // The Mermaid diagram serves as the "Connection Map".
        
    </script>
  </body>
</html>
