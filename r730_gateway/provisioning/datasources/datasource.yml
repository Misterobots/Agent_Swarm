apiVersion: 1

# IMPORTANT: uid values MUST match the datasource UIDs referenced in
# all dashboard JSON files (r730_gateway/dashboards/*.json).
# Without explicit UIDs, Grafana auto-generates random ones that
# cause every dashboard panel to show "No data".

deleteDatasources:
  - name: Prometheus
    orgId: 1
  - name: Loki
    orgId: 1
  - name: PostgreSQL-Swarm
    orgId: 1

datasources:
  - name: Prometheus
    uid: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus-r730:9090
    isDefault: true
    editable: true

  - name: Loki
    uid: Loki
    type: loki
    access: proxy
    url: http://loki-r730:3100
    isDefault: false
    editable: true

  - name: PostgreSQL-Swarm
    uid: PostgreSQL-Swarm
    type: grafana-postgresql-datasource
    access: proxy
    url: 192.168.2.102:5432
    database: langfuse
    user: langfuse
    isDefault: false
    editable: true
    jsonData:
      sslmode: disable
      postgresVersion: 1500
    secureJsonData:
      password: langfuse_password
