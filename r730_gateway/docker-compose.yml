# R730 Gateway & Ops Hub Docker Compose
# Routing handled by Saltbox's Traefik (connected to ai_lab_net externally)
# Hosts: Monitoring (Prometheus, Loki, Grafana), Logging, Ollama, Open-WebUI
# Compute services (Ollama, BMO Voice, ComfyUI, etc.) remain on Justin-PC @ 192.168.2.101

services:
  # Docker Sidecar Probe - exposes read-only container metadata for central monitoring
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:latest
    container_name: docker-socket-proxy-r730
    restart: unless-stopped
    environment:
      - CONTAINERS=1
      - INFO=1
      - PING=1
      - VERSION=1
      - EVENTS=0
      - POST=0
      - AUTH=0
      - BUILD=0
      - IMAGES=0
      - NETWORKS=0
      - VOLUMES=0
      - SYSTEM=0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "2375:2375"
    networks:
      - ai_lab_net

  # ═══════════════════════════════════════════════════════════════════════════════
  # WORKLOAD IDENTITY (SPIRE Agent)
  # ═══════════════════════════════════════════════════════════════════════════════

  spire-agent-r730:
    image: ghcr.io/spiffe/spire-agent:1.10.1
    container_name: spire-agent-r730
    hostname: spire-agent-r730
    restart: unless-stopped
    volumes:
      - ./config/spire:/etc/spire/agent
      - spire_agent_data:/run/spire/agent
      - spire_socket:/var/run/spire
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: ["-config", "/etc/spire/agent/agent.conf", "-joinToken", "${SPIRE_R730_JOIN_TOKEN}"]
    healthcheck:
      test: ["CMD", "/opt/spire/bin/spire-agent", "healthcheck", "-socketPath", "/var/run/spire/agent.sock"]
      interval: 30s
      timeout: 10s
      retries: 3
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - ai_lab_net

  # ═══════════════════════════════════════════════════════════════════════════════
  # METRICS & OBSERVABILITY
  # ═══════════════════════════════════════════════════════════════════════════════

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus-r730
    hostname: prometheus-r730
    restart: unless-stopped
    volumes:
      - ./config/prometheus:/etc/prometheus
      - prometheus_data:/prometheus
    ports:
      - "9091:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=90d'  # Keep 3 months of metrics
    networks:
      - ai_lab_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.prometheus.rule=PathPrefix(`/prometheus`)"
      - "traefik.http.routers.prometheus.entrypoints=web"
      - "traefik.http.services.prometheus.loadbalancer.server.port=9090"

  loki:
    image: grafana/loki:latest
    container_name: loki-r730
    hostname: loki-r730
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./config/loki:/etc/loki
      - loki_data:/tmp/loki
    command: -config.file=/etc/loki/loki.yml
    networks:
      - ai_lab_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.loki.rule=PathPrefix(`/loki`)"
      - "traefik.http.routers.loki.entrypoints=web"
      - "traefik.http.services.loki.loadbalancer.server.port=3100"

  promtail:
    image: grafana/promtail:latest
    container_name: promtail-r730
    hostname: promtail-r730
    restart: unless-stopped
    volumes:
      - ./config/promtail:/etc/promtail
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
    command: -config.file=/etc/promtail/promtail.yml
    networks:
      - ai_lab_net

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor-r730
    hostname: cadvisor-r730
    restart: unless-stopped
    ports:
      - "8888:8080"  # Use 8888 to avoid conflict with Traefik dashboard @ 8080
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    devices:
      - /dev/kmsg
    networks:
      - ai_lab_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.cadvisor.rule=PathPrefix(`/cadvisor`)"
      - "traefik.http.routers.cadvisor.entrypoints=web"
      - "traefik.http.services.cadvisor.loadbalancer.server.port=8080"

  grafana:
    image: grafana/grafana:latest
    container_name: grafana-r730
    hostname: grafana-r730
    restart: unless-stopped
    ports:
      - "3001:3000"  # Port 3001 to avoid conflict with Langfuse @ 3000 and Open-WebUI
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER}
      - GF_SECURITY_SECRET_KEY=${GF_SECURITY_SECRET_KEY}
      - GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS=
      - GF_LOG_LEVEL=info
    volumes:
      - grafana_data:/var/lib/grafana
      - ./provisioning:/etc/grafana/provisioning:ro
      - ./dashboards:/etc/grafana/dashboards:ro
    depends_on:
      - prometheus
      - loki
    networks:
      - ai_lab_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=PathPrefix(`/grafana`)"
      - "traefik.http.routers.grafana.entrypoints=web"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"

  # ═══════════════════════════════════════════════════════════════════════════════
  # TASK QUEUE & PERSISTENCE
  # ═══════════════════════════════════════════════════════════════════════════════

  redis:
    image: redis:7.2-alpine
    container_name: redis-r730
    hostname: redis-r730
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes  # Enable AOF persistence
    networks:
      - ai_lab_net
    # No Traefik labels — Redis accessed directly on port 6379, not via reverse proxy

  # ═══════════════════════════════════════════════════════════════════════════════
  # INFERENCE SERVICES (Secondary, lower priority than Justin-PC)
  # ═══════════════════════════════════════════════════════════════════════════════

  ollama:
    image: ollama/ollama:latest
    container_name: ollama-r730
    hostname: ollama-r730
    restart: always
    depends_on:
      spire-agent-r730:
        condition: service_started
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      # RTX 3070 Ti settings (8GB VRAM)
      - OLLAMA_HOST=0.0.0.0:11434
      - OLLAMA_GPU_OVERHEAD=512MiB
      - OLLAMA_FLASH_ATTENTION=1
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_KEEP_ALIVE=10m
    volumes:
      - ollama_models:/root/.ollama
    ports:
      - "11434:11434"
    networks:
      - ai_lab_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ollama.rule=PathPrefix(`/ollama`)"
      - "traefik.http.routers.ollama.entrypoints=web"
      - "traefik.http.services.ollama.loadbalancer.server.port=11434"
      - "spiffe.io/spiffe-id=spiffe://home-ai-lab/inference/ollama-r730"

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui-r730
    hostname: open-webui
    restart: unless-stopped
    depends_on:
      - ollama
    environment:
      # Point to local Ollama
      - OLLAMA_BASE_URL=http://ollama:11434
      # Disable default OpenAI integration
      - OPENAI_API_BASE_URL=
      - OPENAI_API_KEY=
      # UI customization
      - WEBUI_DEFAULT_MODELS=nemotron-mini
      - WEBUI_NAME=MarsRL Hive Gateway
      - WEBUI_URL=http://192.168.2.103:3000
    volumes:
      - open-webui_data:/app/backend/data
    ports:
      - "3000:8080"
    networks:
      - ai_lab_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.open-webui.rule=PathPrefix(`/webui`)"
      - "traefik.http.routers.open-webui.entrypoints=web"
      - "traefik.http.services.open-webui.loadbalancer.server.port=8080"

  # ═══════════════════════════════════════════════════════════════════════════════
  # UNIFIED UI (Hive Mind — Next.js)
  # ═══════════════════════════════════════════════════════════════════════════════

  hive-ui:
    build:
      context: ../ui
      dockerfile: Dockerfile
      args:
        API_BASE_URL: http://192.168.2.101:8008
    image: home-ai-lab/hive-ui:latest
    container_name: hive_ui
    restart: unless-stopped
    environment:
      - API_BASE_URL=http://192.168.2.101:8008
    ports:
      - "3200:3000"
    networks:
      - ai_lab_net
      - saltbox
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.hive-ui.rule=Host(`hive.shivelymedia.com`)"
      - "traefik.http.routers.hive-ui.entrypoints=websecure"
      - "traefik.http.routers.hive-ui.tls=true"
      - "traefik.http.routers.hive-ui.tls.certresolver=cfdns"
      - "traefik.http.routers.hive-ui-http.rule=Host(`hive.shivelymedia.com`)"
      - "traefik.http.routers.hive-ui-http.entrypoints=web"
      - "traefik.http.services.hive-ui.loadbalancer.server.port=3000"
      - "traefik.docker.network=saltbox"

  # ═══════════════════════════════════════════════════════════════════════════════
  # ROUTING CONFIGURATION FOR JUSTIN-PC SERVICES (via Traefik)
  # ═══════════════════════════════════════════════════════════════════════════════
  # 
  # Justin-PC containers (comfyui, bmo-voice, agent-runtime, etc.) are NOT defined here.
  # Instead, Traefik discovers them via Docker API from Justin-PC.
  #
  # For local testing or specific routing, uncomment below and configure labels:
  #
  # Example routing to Justin-PC services:
  # - Agent Runtime: traefik rule = PathPrefix(`/swarm`)  → justin-pc:8008
  # - ComfyUI:       traefik rule = PathPrefix(`/comfy`)  → justin-pc:8188
  # - OpenHands:     traefik rule = PathPrefix(`/hands`)  → justin-pc:3000
  #
  # These are configured via docker-compose labels on Justin-PC containers
  # and auto-discovered by Traefik.

networks:
  ai_lab_net:
    driver: bridge
    name: ai_lab_net
  saltbox:
    external: true

volumes:
  spire_agent_data:
    driver: local
  spire_socket:
    driver: local
  prometheus_data:
    driver: local
  loki_data:
    driver: local
  grafana_data:
    driver: local
  redis_data:
    driver: local
  ollama_models:
    driver: local
  open-webui_data:
    driver: local
