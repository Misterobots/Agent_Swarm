global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

rule_files:
  - /etc/prometheus/alert_rules.yml

scrape_configs:
  # ═══════════════════════════════════════════════════════════════
  # TURING GATEWAY (192.168.2.103) — Self-monitoring
  # ═══════════════════════════════════════════════════════════════

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          node: 'turing'

  - job_name: 'turing_cadvisor'
    static_configs:
      - targets: ['cadvisor-turing:8080']
        labels:
          node: 'turing'
    scrape_timeout: 30s
    scrape_interval: 30s

  - job_name: 'turing_traefik'
    static_configs:
      - targets: ['traefik-gateway:8080']
        labels:
          node: 'Turing'
    metrics_path: /metrics

  # ═══════════════════════════════════════════════════════════════
  # Lovelace COMPUTE (192.168.2.101) — GPU & Agent Services
  # ═══════════════════════════════════════════════════════════════

  - job_name: 'justin_agent_runtime'
    static_configs:
      - targets: ['192.168.2.101:8008']
        labels:
          node: 'Lovelace'
          service: 'agent-runtime'
    metrics_path: /metrics
    scrape_interval: 30s

  # ═══════════════════════════════════════════════════════════════
  # CONTROL PLANE — WYSE 5070 (192.168.2.102)
  # ═══════════════════════════════════════════════════════════════

  - job_name: 'control_security'
    static_configs:
      - targets: ['192.168.2.102:8001']
        labels:
          node: 'hopper'
          service: 'security'
    metrics_path: /metrics
    scrape_interval: 30s

